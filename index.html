<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect 4 Arena</title>
  <style>
    :root {
      --bg: #0a1628;
      --surface: rgba(15, 28, 48, 0.85);
      --border: rgba(255, 255, 255, 0.1);
      --text: #e4edf5;
      --muted: #7a93a8;
      --accent: #fbbf24;
      --danger: #ef4444;
      --glow-blue: rgba(59, 130, 246, 0.15);
      --glow-purple: rgba(139, 92, 246, 0.1);
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 50%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 90%, rgba(6, 182, 212, 0.04) 0%, transparent 45%);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Lobby ── */
    .lobby-header { text-align: center; padding: 32px 0 16px; }
    .lobby-header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 0 30px rgba(59, 130, 246, 0.3), 0 0 60px rgba(59, 130, 246, 0.1);
    }
    .lobby-header p { color: var(--muted); margin-top: 4px; }

    .card {
      background: rgba(15, 28, 48, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(100, 180, 255, 0.08);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3), 0 0 1px rgba(100, 180, 255, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      transition: border-color 0.4s, box-shadow 0.4s;
    }
    .card:hover {
      border-color: rgba(100, 180, 255, 0.16);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3), 0 0 20px rgba(59, 130, 246, 0.07), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .card h3 {
      font-size: 0.88rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .lobby-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .form-group label { font-size: 0.82rem; color: var(--muted); }

    input, select {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      font: inherit;
      font-size: 0.9rem;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    option { background: #1a2a40; }

    button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover:not(:disabled) { opacity: 0.9; box-shadow: 0 0 16px rgba(251, 191, 36, 0.2); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: rgba(255, 255, 255, 0.12); color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 0.82rem; }

    .error-msg { color: var(--danger); font-size: 0.82rem; margin-top: 4px; min-height: 1em; }
    .hidden { display: none !important; }

    .room-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
    .room-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
    }
    .room-item-info { font-size: 0.9rem; }
    .room-item-meta { color: var(--muted); font-size: 0.78rem; }
    .empty-msg { color: var(--muted); font-size: 0.85rem; }

    /* ── Room View ── */
    #roomView { display: flex; flex-direction: column; gap: 12px; }

    .room-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 8px;
    }
    .room-info h2 { font-size: 1.15rem; font-weight: 700; }
    .room-chips { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .chip {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .status-line {
      font-size: 0.95rem;
      font-weight: 600;
      margin-top: 6px;
      color: var(--accent);
      min-height: 1.3em;
    }
    .room-btns { display: flex; gap: 6px; flex-wrap: wrap; }

    /* Players bar */
    .players-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .player-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      font-size: 0.85rem;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .player-badge.me { border-color: rgba(255, 255, 255, 0.35); }
    .player-badge.active-turn { border-color: var(--accent); box-shadow: 0 0 12px rgba(251, 191, 36, 0.3), 0 0 24px rgba(251, 191, 36, 0.1); }
    .player-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .player-wins { color: var(--muted); font-size: 0.75rem; }

    /* ── Classic Board ── */
    .board-container {
      display: flex;
      justify-content: center;
      padding: 8px 0;
      animation: float 6s ease-in-out infinite;
    }

    .classic-board {
      display: flex;
      flex-direction: column;
      max-width: 500px;
      width: 100%;
    }

    .classic-drop-row {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 2px;
      margin-bottom: 4px;
      padding: 0 6px;
    }

    .drop-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 1.1rem;
      padding: 4px 0;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .drop-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--border);
      color: var(--text);
    }
    .drop-btn:disabled { opacity: 0.2; cursor: default; }

    .classic-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 2px;
      background: linear-gradient(180deg, #1a3a5c, #15304d);
      border-radius: 10px;
      padding: 6px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 20px rgba(59, 130, 246, 0.06);
    }

    .cell {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(0, 8, 20, 0.85);
      border: 2px solid rgba(255, 255, 255, 0.06);
      transition: transform 0.15s;
    }

    .piece-0 { background: radial-gradient(circle at 35% 30%, #ff8a8a, #ef4444 60%); border-color: rgba(239, 68, 68, 0.3); }
    .piece-1 { background: radial-gradient(circle at 35% 30%, #fff0a0, #facc15 60%); border-color: rgba(250, 204, 21, 0.3); }
    .piece-2 { background: radial-gradient(circle at 35% 30%, #93c5fd, #3b82f6 60%); border-color: rgba(59, 130, 246, 0.3); }
    .piece-3 { background: radial-gradient(circle at 35% 30%, #86efac, #22c55e 60%); border-color: rgba(34, 197, 94, 0.3); }

    .cell.win-cell {
      animation: pulse-win 0.7s ease-in-out var(--win-delay, 0.35s) infinite alternate;
    }
    .cell.win-cell.drop-anim {
      animation: piece-drop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                 pulse-win 0.7s ease-in-out var(--win-delay, 0.35s) infinite alternate;
    }

    .cell.drop-anim {
      animation: piece-drop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes piece-drop {
      from { transform: translateY(-200%); opacity: 0.5; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes pulse-win {
      0%   { transform: scale(1);    filter: brightness(1);   box-shadow: none; }
      50%  { transform: scale(1.28); filter: brightness(1.9); box-shadow: 0 0 30px rgba(255, 255, 255, 1); }
      100% { transform: scale(1.12); filter: brightness(1.45); box-shadow: 0 0 18px rgba(255, 255, 255, 0.65); }
    }

    /* ── 3D Board ── */
    .board3d-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .board3d-controls label { font-size: 0.82rem; color: var(--muted); }

    .board3d-shell {
      width: 100%;
      height: min(70vw, 480px);
      border-radius: 16px;
      overflow: visible;
      border: 1px solid rgba(100, 180, 255, 0.1);
      background: radial-gradient(ellipse at 50% 30%, rgba(20, 40, 80, 0.7), var(--bg) 70%);
      position: relative;
      perspective: 900px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(59, 130, 246, 0.06), inset 0 0 60px rgba(59, 130, 246, 0.03);
    }

    .board3d-hint {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 0.72rem;
      background: rgba(0, 0, 0, 0.5);
      padding: 3px 10px;
      border-radius: 99px;
      z-index: 5;
      pointer-events: none;
    }

    .board3d-scene {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      cursor: grab;
      display: grid;
      place-items: center;
      touch-action: none;
    }
    .board3d-scene.dragging { cursor: grabbing; }

    .board3d {
      position: relative;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
    }

    .voxel {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      transform-style: preserve-3d;
      border: 2px solid rgba(100, 180, 255, 0.08);
      background: rgba(5, 12, 25, 0.7);
      box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.4), 0 0 6px rgba(59, 130, 246, 0.04);
      transition: transform 0.15s, box-shadow 0.3s;
    }
    .voxel.piece-0 { box-shadow: 0 0 14px rgba(239, 68, 68, 0.35), inset 0 0 6px rgba(0,0,0,0.2); }
    .voxel.piece-1 { box-shadow: 0 0 14px rgba(250, 204, 21, 0.3), inset 0 0 6px rgba(0,0,0,0.2); }
    .voxel.piece-2 { box-shadow: 0 0 14px rgba(59, 130, 246, 0.35), inset 0 0 6px rgba(0,0,0,0.2); }
    .voxel.piece-3 { box-shadow: 0 0 14px rgba(34, 197, 94, 0.35), inset 0 0 6px rgba(0,0,0,0.2); }

    .voxel.win-cell {
      animation: pulse-win-3d 0.7s ease-in-out var(--win-delay, 0.35s) infinite alternate;
    }

    @keyframes pulse-win-3d {
      0%   { box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.4); filter: brightness(1); }
      50%  { box-shadow: 0 0 36px 12px rgba(255, 255, 140, 1); filter: brightness(2); }
      100% { box-shadow: 0 0 22px 6px rgba(255, 255, 200, 0.85); filter: brightness(1.55); }
    }

    .drop-node {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.4);
      display: grid;
      place-items: center;
      font-size: 0.65rem;
      cursor: pointer;
      z-index: 4;
      user-select: none;
      touch-action: manipulation;
      transition: all 0.2s;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.03);
    }
    .drop-node:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.35);
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.1);
      transform-origin: center;
    }
    .drop-node:disabled { opacity: 0.15; cursor: default; }
    .drop-node.suggest-0 { background: rgba(239, 68, 68, 0.35); border-color: rgba(239, 68, 68, 0.6); box-shadow: 0 0 12px rgba(239, 68, 68, 0.25); }
    .drop-node.suggest-1 { background: rgba(250, 204, 21, 0.35); border-color: rgba(250, 204, 21, 0.6); box-shadow: 0 0 12px rgba(250, 204, 21, 0.25); }
    .drop-node.suggest-2 { background: rgba(59, 130, 246, 0.35); border-color: rgba(59, 130, 246, 0.6); box-shadow: 0 0 12px rgba(59, 130, 246, 0.25); }
    .drop-node.suggest-3 { background: rgba(34, 197, 94, 0.35); border-color: rgba(34, 197, 94, 0.6); box-shadow: 0 0 12px rgba(34, 197, 94, 0.25); }

    /* ── Win Overlay ── */
    #winOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
      background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.55) 0%, transparent 68%);
    }
    #winOverlay.show { opacity: 1; }

    .win-text {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 900;
      text-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
      animation: win-pop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                 win-glow 0.9s 0.65s ease-in-out infinite alternate;
    }

    @keyframes win-pop {
      from { transform: scale(0.15) rotate(-10deg); opacity: 0; }
      60%  { transform: scale(1.22) rotate(4deg);  opacity: 1; }
      80%  { transform: scale(0.92) rotate(-2deg); }
      to   { transform: scale(1)    rotate(0deg);  opacity: 1; }
    }

    @keyframes win-glow {
      from { text-shadow: 0 4px 30px rgba(0, 0, 0, 0.8); filter: brightness(1); }
      to   { text-shadow: 0 0 50px currentColor, 0 0 110px currentColor, 0 4px 30px rgba(0, 0, 0, 0.8); filter: brightness(1.35); }
    }

    /* ── Confetti Canvas ── */
    #confettiCanvas {
      position: fixed;
      inset: 0;
      z-index: 99;
      pointer-events: none;
    }

    /* ── Screen shake ── */
    @keyframes shake {
      0%, 100% { transform: translate(0); }
      15% { transform: translate(-5px, 3px); }
      30% { transform: translate(5px, -4px); }
      45% { transform: translate(-4px, 5px); }
      60% { transform: translate(4px, -3px); }
      75% { transform: translate(-3px, 4px); }
    }
    .shake { animation: shake 0.55s ease; }

    @keyframes board-flash {
      0%   { box-shadow: none; }
      18%  { box-shadow: 0 0 90px 28px rgba(255, 255, 255, 0.45); }
      100% { box-shadow: none; }
    }
    .board-flash { animation: board-flash 0.85s ease-out; }

    /* ── Neo-futuristic ambient ── */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes shimmer-border {
      0%, 100% { border-color: rgba(100, 180, 255, 0.06); }
      50% { border-color: rgba(100, 180, 255, 0.18); }
    }

    #boardCard {
      animation: shimmer-border 5s ease-in-out infinite;
    }

    .status-line {
      text-shadow: 0 0 20px currentColor;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .lobby-row { grid-template-columns: 1fr; }
      .players-bar { gap: 4px; }
      .player-badge { padding: 4px 8px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <canvas id="confettiCanvas"></canvas>
  <div id="winOverlay"><div class="win-text" id="winText"></div></div>

  <main class="app">
    <!-- LOBBY -->
    <section id="lobbyView">
      <div class="lobby-header">
        <h1>Connect 4</h1>
        <p>4-Player Arena &middot; Classic &amp; 3D</p>
      </div>

      <div class="lobby-row">
        <div class="card">
          <h3>Create Room</h3>
          <div class="form-group">
            <label>Room Name</label>
            <input id="createName" maxlength="30" placeholder="My Room" />
          </div>
          <div class="form-group">
            <label>Mode</label>
            <select id="createMode">
              <option value="classic">Classic 2D</option>
              <option value="3d">3D (4&times;4&times;4)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Visibility</label>
            <select id="createVisibility">
              <option value="public">Public</option>
              <option value="private">Private</option>
            </select>
          </div>
          <button id="createRoomBtn">Create</button>
          <div id="createError" class="error-msg"></div>
        </div>

        <div class="card">
          <h3>Join by Code</h3>
          <div class="form-group">
            <label>Room Code</label>
            <input id="joinCode" maxlength="10" placeholder="ABC123" />
          </div>
          <button id="joinCodeBtn" class="btn-secondary">Join</button>
          <div id="joinCodeError" class="error-msg"></div>
        </div>
      </div>

      <div class="card" style="margin-top:12px;">
        <h3>Public Rooms</h3>
        <div id="publicRooms" class="room-list"></div>
      </div>
    </section>

    <!-- ROOM -->
    <section id="roomView" class="hidden">
      <div class="card">
        <div class="room-top">
          <div class="room-info">
            <h2 id="roomTitle">Room</h2>
            <div class="room-chips">
              <span id="modeChip" class="chip"></span>
              <span id="visibilityChip" class="chip"></span>
              <span id="codeChip" class="chip hidden"></span>
              <span id="hostChip" class="chip hidden">Host</span>
            </div>
            <div id="statusLine" class="status-line"></div>
          </div>
          <div class="room-btns">
            <button id="startBtn" class="btn-sm hidden">Start</button>
            <button id="restartBtn" class="btn-sm btn-secondary hidden">Restart</button>
            <button id="rematchBtn" class="btn-sm hidden">Rematch</button>
            <button id="leaveBtn" class="btn-sm btn-danger">Leave</button>
          </div>
        </div>
      </div>

      <div id="playersBar" class="players-bar"></div>

      <div class="card" id="boardCard">
        <div id="classicArea"></div>
        <div id="mode3dArea" class="hidden"></div>
      </div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    /* ── DOM refs ── */
    const lobbyView = document.getElementById("lobbyView");
    const roomView = document.getElementById("roomView");
    const createName = document.getElementById("createName");
    const createMode = document.getElementById("createMode");
    const createVisibility = document.getElementById("createVisibility");
    const createRoomBtn = document.getElementById("createRoomBtn");
    const createError = document.getElementById("createError");
    const joinCode = document.getElementById("joinCode");
    const joinCodeBtn = document.getElementById("joinCodeBtn");
    const joinCodeError = document.getElementById("joinCodeError");
    const publicRoomsEl = document.getElementById("publicRooms");
    const roomTitle = document.getElementById("roomTitle");
    const modeChip = document.getElementById("modeChip");
    const visibilityChip = document.getElementById("visibilityChip");
    const codeChip = document.getElementById("codeChip");
    const hostChip = document.getElementById("hostChip");
    const statusLine = document.getElementById("statusLine");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const rematchBtn = document.getElementById("rematchBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const playersBar = document.getElementById("playersBar");
    const classicArea = document.getElementById("classicArea");
    const mode3dArea = document.getElementById("mode3dArea");
    const boardCard = document.getElementById("boardCard");
    const confettiCanvas = document.getElementById("confettiCanvas");
    const winOverlay = document.getElementById("winOverlay");
    const winText = document.getElementById("winText");

    /* ── Constants ── */
    const CLASSIC_ROWS = 7;
    const CLASSIC_COLS = 9;
    const D3_SIZE = 4;

    /* ── State ── */
    let publicRooms = [];
    let roomState = null;
    let mySlotIndex = null;
    let prevBoard = null;
    let prevPhase = null;

    const camera = { rotX: -27, rotY: 34, panX: 0, panY: 0, layerSpacing: 78, drag: null };

    /* ── Helpers ── */
    function showLobby() { lobbyView.classList.remove("hidden"); roomView.classList.add("hidden"); }
    function showRoom() { lobbyView.classList.add("hidden"); roomView.classList.remove("hidden"); }
    function clearErrors() { createError.textContent = ""; joinCodeError.textContent = ""; }

    function activeSlots(s) {
      return s.slots.map((sl, i) => ({ sl, i })).filter(x => x.sl.occupied).map(x => x.i);
    }
    function isHost() { return roomState && mySlotIndex === roomState.hostSlot; }
    function canPlayTurn() { return roomState && roomState.phase === "playing" && mySlotIndex === roomState.currentSlot; }
    function playerName(i) { return roomState?.slots[i]?.name || "P" + (i + 1); }
    function playerColor(i) { return roomState?.slots[i]?.color || "#fff"; }

    function escapeHtml(t) {
      return String(t).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function winSet2D(s) {
      if (!s.winResult || !Array.isArray(s.winResult.cells)) return new Set();
      return new Set(s.winResult.cells.map(([r, c]) => r + "," + c));
    }

    function winSet3D(s) {
      if (!s.winResult || !Array.isArray(s.winResult.cells)) return new Set();
      return new Set(s.winResult.cells.map(([y, x, z]) => y + "," + x + "," + z));
    }

    /* ── Render Public Rooms ── */
    function renderPublicRooms() {
      publicRoomsEl.innerHTML = "";
      if (publicRooms.length === 0) {
        publicRoomsEl.innerHTML = '<div class="empty-msg">No public rooms yet.</div>';
        return;
      }
      for (const room of publicRooms) {
        const item = document.createElement("div");
        item.className = "room-item";
        item.innerHTML =
          '<div><div class="room-item-info">' + escapeHtml(room.name) + '</div>' +
          '<div class="room-item-meta">' + (room.gameMode === "3d" ? "3D" : "Classic") +
          " \u00B7 " + room.playerCount + "/" + room.maxPlayers + " \u00B7 " + room.phase + '</div></div>';
        const btn = document.createElement("button");
        btn.className = "btn-sm btn-secondary";
        btn.textContent = "Join";
        btn.disabled = room.phase !== "lobby" || !!roomState;
        btn.onclick = () => {
          clearErrors();
          socket.emit("joinRoom", { roomId: room.id }, (r) => {
            r = r || {};
            if (r.error) { joinCodeError.textContent = r.error; return; }
            mySlotIndex = r.slotIndex;
          });
        };
        item.appendChild(btn);
        publicRoomsEl.appendChild(item);
      }
    }

    /* ── Render Room ── */
    function renderRoom() {
      if (!roomState) { showLobby(); return; }
      showRoom();

      roomTitle.textContent = roomState.name;
      modeChip.textContent = roomState.gameMode === "3d" ? "3D" : "Classic";
      visibilityChip.textContent = roomState.isPublic ? "Public" : "Private";
      if (roomState.code) { codeChip.textContent = "Code: " + roomState.code; codeChip.classList.remove("hidden"); }
      else { codeChip.classList.add("hidden"); }
      hostChip.classList.toggle("hidden", !isHost());

      statusLine.textContent = buildStatus();

      const host = isHost();
      const active = activeSlots(roomState);
      startBtn.classList.toggle("hidden", !(roomState.phase === "lobby" && active.length >= 2 && host));
      restartBtn.classList.toggle("hidden", !(host && (roomState.phase === "playing" || roomState.phase === "ended")));
      rematchBtn.classList.toggle("hidden", !(host && roomState.phase === "ended"));

      renderPlayersBar();

      if (roomState.gameMode === "classic") {
        mode3dArea.classList.add("hidden");
        classicArea.classList.remove("hidden");
        renderClassicBoard();
      } else {
        classicArea.classList.add("hidden");
        mode3dArea.classList.remove("hidden");
        render3DBoard();
      }

      if (roomState.phase === "ended" && roomState.winResult && prevPhase !== "ended") {
        celebrate(roomState.winResult.slotIndex);
      }
      prevPhase = roomState.phase;
    }

    function buildStatus() {
      if (!roomState) return "";
      if (roomState.phase === "lobby") {
        const n = activeSlots(roomState).length;
        if (isHost()) return n < 2 ? "Waiting for players\u2026" : "Ready! Press Start.";
        return "Waiting for host\u2026";
      }
      if (roomState.phase === "playing") {
        const c = roomState.currentSlot;
        return c === mySlotIndex ? "\uD83C\uDFAF Your turn!" : playerName(c) + "'s turn";
      }
      if (roomState.phase === "ended") {
        if (roomState.winResult) return "\uD83C\uDFC6 " + playerName(roomState.winResult.slotIndex) + " wins!";
        return "Draw! No one wins.";
      }
      return "";
    }

    function renderPlayersBar() {
      playersBar.innerHTML = "";
      roomState.slots.forEach((slot, i) => {
        const badge = document.createElement("div");
        badge.className = "player-badge";
        if (i === mySlotIndex) badge.classList.add("me");
        if (roomState.phase === "playing" && i === roomState.currentSlot) badge.classList.add("active-turn");
        badge.innerHTML =
          '<span class="player-dot" style="background:' + slot.color + '"></span>' +
          '<span>' + slot.name + (i === mySlotIndex ? " (You)" : "") + '</span>' +
          '<span class="player-wins">' + (slot.occupied ? "W:" + (roomState.wins[i] || 0) : "Empty") + '</span>';
        playersBar.appendChild(badge);
      });
    }

    /* ── Classic Board ── */
    function renderClassicBoard() {
      if (!roomState.board) {
        classicArea.innerHTML = '<p class="empty-msg">Waiting for host to start\u2026</p>';
        prevBoard = null;
        return;
      }

      const canDrop = canPlayTurn();
      const wins = winSet2D(roomState);
      const winsArr = [...wins];

      let newCell = null;
      if (prevBoard && roomState.gameMode === "classic") {
        for (let r = 0; r < CLASSIC_ROWS; r++) {
          for (let c = 0; c < CLASSIC_COLS; c++) {
            if (prevBoard[r] && prevBoard[r][c] === null && roomState.board[r][c] !== null) {
              newCell = r + "," + c;
            }
          }
        }
      }
      prevBoard = roomState.board.map(row => row.slice());

      const wrap = document.createElement("div");
      wrap.className = "board-container";

      const board = document.createElement("div");
      board.className = "classic-board";

      const dropRow = document.createElement("div");
      dropRow.className = "classic-drop-row";
      for (let c = 0; c < CLASSIC_COLS; c++) {
        const btn = document.createElement("button");
        btn.className = "drop-btn";
        btn.textContent = "\u25BC";
        btn.disabled = !canDrop;
        const col = c;
        btn.onclick = () => socket.emit("dropDisc", { col });
        dropRow.appendChild(btn);
      }

      const grid = document.createElement("div");
      grid.className = "classic-grid";
      for (let r = 0; r < CLASSIC_ROWS; r++) {
        for (let c = 0; c < CLASSIC_COLS; c++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          const v = roomState.board[r][c];
          if (typeof v === "number") cell.classList.add("piece-" + v);
          if (wins.has(r + "," + c)) {
            cell.classList.add("win-cell");
            const idx = winsArr.indexOf(r + "," + c);
            cell.style.setProperty("--win-delay", (0.35 + idx * 0.1) + "s");
          }
          if (newCell === r + "," + c) cell.classList.add("drop-anim");
          grid.appendChild(cell);
        }
      }

      board.appendChild(dropRow);
      board.appendChild(grid);
      wrap.appendChild(board);
      classicArea.innerHTML = "";
      classicArea.appendChild(wrap);
    }

    /* ── 3D Board ── */
    function render3DBoard() {
      if (!roomState.board) {
        mode3dArea.innerHTML = '<p class="empty-msg">Waiting for host to start\u2026</p>';
        return;
      }

      const canDrop = canPlayTurn();
      const wins = winSet3D(roomState);

      mode3dArea.innerHTML =
        '<div class="board3d-controls">' +
        '<label>Spacing</label>' +
        '<input id="layerSpacing" type="range" min="42" max="130" value="' + camera.layerSpacing + '" style="width:160px">' +
        '<button id="resetCam" class="btn-sm btn-secondary" type="button">Reset View</button>' +
        '</div>' +
        '<div class="board3d-shell" id="board3dShell">' +
        '<div class="board3d-hint">Drag to rotate \u00B7 Shift+drag to pan</div>' +
        '<div class="board3d-scene" id="board3dScene">' +
        '<div class="board3d" id="board3d"></div>' +
        '</div></div>';

      const scene = document.getElementById("board3dScene");
      const board = document.getElementById("board3d");
      const spacingInput = document.getElementById("layerSpacing");
      const resetBtn = document.getElementById("resetCam");

      applyCamera(scene);
      wireScenePan(scene);

      spacingInput.oninput = () => {
        camera.layerSpacing = Number(spacingInput.value);
        draw3D(board, wins, canDrop);
      };
      resetBtn.onclick = () => {
        camera.rotX = -27; camera.rotY = 34;
        camera.panX = 0; camera.panY = 0;
        applyCamera(scene);
      };

      draw3D(board, wins, canDrop);
    }

    function draw3D(boardEl, wins, canDrop) {
      boardEl.innerHTML = "";
      const winsArr = [...wins];
      const step = 68;
      const center = (D3_SIZE - 1) / 2;
      const lStep = camera.layerSpacing;

      for (let y = 0; y < D3_SIZE; y++) {
        for (let x = 0; x < D3_SIZE; x++) {
          for (let z = 0; z < D3_SIZE; z++) {
            const tx = (x - center) * step;
            const tz = (z - center) * step;
            const ty = (y - center) * lStep;

            const voxel = document.createElement("div");
            voxel.className = "voxel";
            voxel.style.transform = "translate3d(" + tx + "px," + (-ty) + "px," + tz + "px)";

            const v = roomState.board[y][x][z];
            if (typeof v === "number") voxel.classList.add("piece-" + v);
            if (wins.has(y + "," + x + "," + z)) {
              voxel.classList.add("win-cell");
              const idx = winsArr.indexOf(y + "," + x + "," + z);
              voxel.style.setProperty("--win-delay", (0.35 + idx * 0.1) + "s");
            }

            boardEl.appendChild(voxel);
          }
        }
      }

      const topY = (D3_SIZE / 2) * lStep + 58;
      for (let x = 0; x < D3_SIZE; x++) {
        for (let z = 0; z < D3_SIZE; z++) {
          const open = roomState.board[D3_SIZE - 1][x][z] === null;
          const tx = (x - center) * step;
          const tz = (z - center) * step;

          const node = document.createElement("button");
          node.type = "button";
          node.className = "drop-node";
          if (canDrop && open) node.classList.add("suggest-" + mySlotIndex);
          node.style.transform = "translate3d(" + tx + "px," + (-topY) + "px," + tz + "px)";
          node.textContent = "\u25BC";
          node.disabled = !canDrop || !open;

          const cx = x, cz = z;
          node.onclick = (e) => {
            e.stopPropagation();
            socket.emit("dropDisc3D", { x: cx, z: cz });
          };

          boardEl.appendChild(node);
        }
      }
    }

    /* ── 3D Camera ── */
    function wireScenePan(scene) {
      scene.oncontextmenu = (e) => e.preventDefault();

      scene.onpointerdown = (e) => {
        // Don't capture pointer when clicking drop buttons — let the click fire normally
        if (e.target.closest(".drop-node")) return;

        camera.drag = { x: e.clientX, y: e.clientY, shift: e.shiftKey, id: e.pointerId };
        scene.setPointerCapture(e.pointerId);
        scene.classList.add("dragging");
      };

      scene.onpointermove = (e) => {
        if (!camera.drag || e.pointerId !== camera.drag.id) return;
        const dx = e.clientX - camera.drag.x;
        const dy = e.clientY - camera.drag.y;

        if (camera.drag.shift) {
          camera.panX += dx;
          camera.panY += dy;
        } else {
          camera.rotY += dx * 0.4;
          camera.rotX = Math.max(-85, Math.min(85, camera.rotX + dy * 0.35));
        }

        camera.drag.x = e.clientX;
        camera.drag.y = e.clientY;
        applyCamera(scene);
      };

      scene.onpointerup = (e) => {
        if (camera.drag && camera.drag.id === e.pointerId) {
          scene.releasePointerCapture(e.pointerId);
          camera.drag = null;
          scene.classList.remove("dragging");
        }
      };

      scene.onpointercancel = () => {
        camera.drag = null;
        scene.classList.remove("dragging");
      };
    }

    function applyCamera(scene) {
      scene.style.transform =
        "translate(" + camera.panX + "px," + camera.panY + "px) " +
        "rotateX(" + camera.rotX + "deg) rotateY(" + camera.rotY + "deg)";
    }

    /* ── Confetti ── */
    const ctx = confettiCanvas.getContext("2d");
    let particles = [];
    let confettiAnim = null;

    function resizeCanvas() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function celebrate(slotIndex) {
      const color = playerColor(slotIndex);

      // Win overlay
      winText.textContent = playerName(slotIndex) + " wins!";
      winText.style.color = color;
      winOverlay.classList.add("show");
      setTimeout(() => winOverlay.classList.remove("show"), 3800);

      // Screen shake + board flash
      boardCard.classList.add("shake");
      setTimeout(() => boardCard.classList.remove("shake"), 550);
      boardCard.classList.add("board-flash");
      setTimeout(() => boardCard.classList.remove("board-flash"), 850);

      // Confetti — two waves
      spawnConfetti(color);
      setTimeout(() => spawnConfetti(color), 600);
    }

    function spawnConfetti(mainColor) {
      const colors = [mainColor, "#fff", "#fbbf24", "#ec4899", "#8b5cf6", "#06b6d4", "#10b981", "#f97316"];
      particles = [];
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;

      for (let i = 0; i < 280; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 5 + Math.random() * 18;
        const burst = i < 100;
        particles.push({
          x: cx + (burst ? 0 : (Math.random() - 0.5) * 100),
          y: cy + (burst ? 0 : (Math.random() - 0.5) * 50) - (burst ? 0 : 90),
          vx: Math.cos(angle) * speed * (0.6 + Math.random() * 0.9),
          vy: Math.sin(angle) * speed * (0.6 + Math.random() * 0.9) - (burst ? 7 : 2),
          size: 5 + Math.random() * 10,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 18,
          life: 1,
          decay: 0.004 + Math.random() * 0.007,
          shape: ["rect", "circle", "star"][Math.floor(Math.random() * 3)],
        });
      }

      if (confettiAnim) cancelAnimationFrame(confettiAnim);
      animateConfetti();
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      let alive = false;

      for (const p of particles) {
        if (p.life <= 0) continue;
        alive = true;

        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.vx *= 0.99;
        p.rotation += p.rotSpeed;
        p.life -= p.decay;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation * Math.PI / 180);
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        if (p.shape === "rect") {
          ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
        } else if (p.shape === "star") {
          const outer = p.size / 2, inner = p.size / 4;
          let rot = -Math.PI / 2;
          const step = Math.PI / 5;
          ctx.beginPath();
          for (let pt = 0; pt < 5; pt++) {
            ctx.lineTo(Math.cos(rot) * outer, Math.sin(rot) * outer); rot += step;
            ctx.lineTo(Math.cos(rot) * inner, Math.sin(rot) * inner); rot += step;
          }
          ctx.closePath();
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      if (alive) {
        confettiAnim = requestAnimationFrame(animateConfetti);
      } else {
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        confettiAnim = null;
      }
    }

    /* ── Event Handlers ── */
    createRoomBtn.onclick = () => {
      if (roomState) return;
      clearErrors();
      socket.emit("createRoom", {
        name: createName.value.trim(),
        isPublic: createVisibility.value === "public",
        gameMode: createMode.value === "3d" ? "3d" : "classic",
      }, (r) => {
        r = r || {};
        if (r.error) { createError.textContent = r.error; return; }
        mySlotIndex = r.slotIndex;
      });
    };

    joinCodeBtn.onclick = () => {
      if (roomState) return;
      clearErrors();
      const code = joinCode.value.trim().toUpperCase();
      if (!code) { joinCodeError.textContent = "Enter a code."; return; }
      socket.emit("joinByCode", { code }, (r) => {
        r = r || {};
        if (r.error) { joinCodeError.textContent = r.error; return; }
        mySlotIndex = r.slotIndex;
      });
    };

    startBtn.onclick = () => socket.emit("startGame");
    restartBtn.onclick = () => socket.emit("restart");
    rematchBtn.onclick = () => socket.emit("rematch");

    leaveBtn.onclick = () => {
      socket.emit("leaveRoom");
      roomState = null;
      mySlotIndex = null;
      prevBoard = null;
      prevPhase = null;
      showLobby();
      renderPublicRooms();
    };

    /* ── Socket Events ── */
    socket.on("roomState", (s) => { roomState = s; renderRoom(); });
    socket.on("publicRooms", (r) => { publicRooms = Array.isArray(r) ? r : []; renderPublicRooms(); });

    socket.on("connect", () => {
      socket.emit("listRooms", {}, (r) => {
        publicRooms = Array.isArray(r) ? r : [];
        renderPublicRooms();
      });
    });

    socket.on("disconnect", () => {
      if (roomState) statusLine.textContent = "Reconnecting\u2026";
    });

    /* ── Init ── */
    showLobby();
    renderPublicRooms();
  </script>
</body>
</html>
