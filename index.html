<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect 4 Arena</title>
  <style>
    :root {
      --bg: #070d1a;
      --surface: rgba(10, 20, 38, 0.8);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8f0f8;
      --muted: #6a8baa;
      --accent: #fbbf24;
      --danger: #ef4444;
      --glass-bg: rgba(10, 20, 40, 0.52);
      --glass-border: rgba(255, 255, 255, 0.07);
      --glass-shine: rgba(255, 255, 255, 0.13);
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    body.light {
      --bg: #d6e8f8;
      --surface: rgba(255, 255, 255, 0.65);
      --border: rgba(0, 0, 0, 0.07);
      --text: #1a2540;
      --muted: #4a6080;
      --accent: #f59e0b;
      --danger: #ef4444;
      --glass-bg: rgba(255, 255, 255, 0.30);
      --glass-border: rgba(255, 255, 255, 0.58);
      --glass-shine: rgba(255, 255, 255, 0.98);
    }

    .app {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    /* ── Lobby ── */
    .lobby-header { text-align: center; padding: 40px 0 20px; }
    .lobby-header h1 {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(160deg, #ffffff 0%, rgba(200, 225, 255, 0.92) 45%, rgba(120, 175, 255, 0.85) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(59, 130, 246, 0.38));
    }
    .lobby-header p { color: var(--muted); margin-top: 6px; font-size: 0.88rem; letter-spacing: 0.03em; }

    .card {
      background:
        linear-gradient(138deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 22%, transparent 40%),
        radial-gradient(ellipse 92% 50% at 96% 100%, rgba(255,255,255,0.04) 0%, transparent 55%),
        var(--glass-bg);
      backdrop-filter: blur(28px) saturate(140%) brightness(1.02);
      -webkit-backdrop-filter: blur(28px) saturate(140%) brightness(1.02);
      border: 1px solid var(--glass-border);
      border-top: 1px solid var(--glass-shine);
      border-radius: 20px;
      padding: 20px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.45),
        0 2px 8px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
      transition: border-color 0.4s, box-shadow 0.4s;
    }
    .card:hover {
      border-color: rgba(255, 255, 255, 0.10);
      border-top-color: rgba(255, 255, 255, 0.20);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.45),
        0 0 30px rgba(59, 130, 246, 0.09),
        inset 0 1px 0 rgba(255, 255, 255, 0.09);
    }

    .card h3 {
      font-size: 0.76rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }

    .lobby-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .form-group label { font-size: 0.80rem; color: var(--muted); letter-spacing: 0.02em; }

    input:not([type="range"]), select {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 10px;
      padding: 9px 12px;
      color: var(--text);
      font: inherit;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input:not([type="range"]):focus, select:focus {
      outline: none;
      border-color: rgba(251, 191, 36, 0.55);
      box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.10);
      background: rgba(255, 255, 255, 0.09);
    }
    option { background: #141f35; color: #e8f0f8; }

    /* ── Range Slider ── */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 22px;
      background: transparent;
      cursor: pointer;
      padding: 0;
      border: none;
      box-shadow: none;
      width: 100%;
    }
    input[type="range"]:focus { outline: none; }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 5px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.11);
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.55);
    }
    input[type="range"]::-moz-range-track {
      height: 5px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.11);
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.55);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      margin-top: -7px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.04) 55%, transparent 100%),
        rgba(255,255,255,0.11);
      border: 1px solid rgba(255,255,255,0.20);
      box-shadow:
        0 2px 8px rgba(0,0,0,0.50),
        inset 0 1px 0 rgba(255,255,255,0.28);
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.18);
      box-shadow:
        0 3px 12px rgba(0,0,0,0.55),
        0 0 16px rgba(255,255,255,0.09),
        inset 0 1px 0 rgba(255,255,255,0.32);
    }
    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.20);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.04) 55%, transparent 100%),
        rgba(255,255,255,0.11);
      box-shadow:
        0 2px 8px rgba(0,0,0,0.50),
        inset 0 1px 0 rgba(255,255,255,0.28);
    }

    body.light input[type="range"]::-webkit-slider-runnable-track {
      background: rgba(0,0,0,0.08);
      border-color: rgba(0,0,0,0.10);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.10), 0 1px 0 rgba(255,255,255,0.70);
    }
    body.light input[type="range"]::-moz-range-track {
      background: rgba(0,0,0,0.08);
      border-color: rgba(0,0,0,0.10);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.10);
    }
    body.light input[type="range"]::-webkit-slider-thumb {
      background:
        linear-gradient(145deg, rgba(255,255,255,0.80) 0%, rgba(255,255,255,0.18) 55%, transparent 100%),
        rgba(255,255,255,0.40);
      border-color: rgba(0,0,0,0.12);
      box-shadow:
        0 2px 8px rgba(0,0,0,0.14),
        inset 0 1px 0 rgba(255,255,255,0.85);
    }
    body.light input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow:
        0 3px 12px rgba(0,0,0,0.16),
        0 0 16px rgba(255,255,255,0.30),
        inset 0 1px 0 rgba(255,255,255,0.90);
    }
    body.light input[type="range"]::-moz-range-thumb {
      background:
        linear-gradient(145deg, rgba(255,255,255,0.80) 0%, rgba(255,255,255,0.18) 55%, transparent 100%),
        rgba(255,255,255,0.40);
      border-color: rgba(0,0,0,0.12);
      box-shadow:
        0 2px 8px rgba(0,0,0,0.14),
        inset 0 1px 0 rgba(255,255,255,0.85);
    }
    body.light input:not([type="range"]),
    body.light select {
      background: rgba(255, 255, 255, 0.52);
      border-color: rgba(0, 0, 0, 0.12);
    }
    body.light input:not([type="range"]):focus,
    body.light select:focus {
      background: rgba(255, 255, 255, 0.72);
      border-color: rgba(251, 191, 36, 0.65);
    }
    body.light option { background: #e6f0ff; color: #1a2540; }

    button {
      background: linear-gradient(145deg, #fcd34d 0%, #fbbf24 55%, #f59e0b 100%);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.18s;
      box-shadow: 0 2px 10px rgba(251, 191, 36, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.22);
      letter-spacing: 0.02em;
    }
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(251, 191, 36, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }
    button:active:not(:disabled) { transform: translateY(0); box-shadow: 0 1px 6px rgba(251, 191, 36, 0.2); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.09);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.10), 0 2px 8px rgba(0,0,0,0.25);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.14);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 4px 16px rgba(0,0,0,0.3);
    }
    .btn-danger {
      background: linear-gradient(145deg, #f87171, #ef4444, #dc2626);
      color: #fff;
      box-shadow: 0 2px 10px rgba(239, 68, 68, 0.25), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .btn-danger:hover:not(:disabled) {
      box-shadow: 0 6px 22px rgba(239, 68, 68, 0.42), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .btn-sm { padding: 6px 14px; font-size: 0.82rem; }

    .error-msg { color: var(--danger); font-size: 0.82rem; margin-top: 4px; min-height: 1em; }
    .hidden { display: none !important; }

    .room-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
    .room-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-top: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.2s, border-top-color 0.2s;
    }
    .room-item:hover { background: rgba(255, 255, 255, 0.055); border-top-color: rgba(100, 180, 255, 0.20); }
    .room-item-info { font-size: 0.9rem; }
    .room-item-meta { color: var(--muted); font-size: 0.78rem; }
    .empty-msg { color: var(--muted); font-size: 0.85rem; }

    /* ── Room View ── */
    #roomView { display: flex; flex-direction: column; gap: 12px; }

    .room-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 8px;
    }
    .room-info h2 { font-size: 1.15rem; font-weight: 700; }
    .room-chips { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .chip {
      font-size: 0.70rem;
      padding: 3px 9px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(8px);
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.08);
      letter-spacing: 0.03em;
    }
    .status-line {
      font-size: 0.95rem;
      font-weight: 600;
      margin-top: 6px;
      color: var(--accent);
      min-height: 1.3em;
      text-shadow: 0 0 20px currentColor;
    }
    .room-btns { display: flex; gap: 6px; flex-wrap: wrap; }

    /* Players bar */
    .players-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .player-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 12px;
      background: rgba(10, 20, 42, 0.55);
      backdrop-filter: blur(20px) saturate(130%) brightness(1.02);
      -webkit-backdrop-filter: blur(20px) saturate(130%) brightness(1.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-top: 1px solid rgba(255, 255, 255, 0.11);
      font-size: 0.85rem;
      transition: border-color 0.3s, box-shadow 0.3s;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
    }
    .player-badge.me { border-color: rgba(255, 255, 255, 0.18); border-top-color: rgba(255, 255, 255, 0.30); }
    .player-badge.active-turn {
      border-color: rgba(251, 191, 36, 0.45);
      border-top-color: rgba(251, 191, 36, 0.70);
      box-shadow: 0 0 16px rgba(251, 191, 36, 0.26), 0 0 32px rgba(251, 191, 36, 0.10), 0 4px 14px rgba(0,0,0,0.3);
    }
    .player-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 8px currentColor; }
    .player-wins { color: var(--muted); font-size: 0.75rem; }

    /* ── Classic Board ── */
    .board-container {
      display: flex;
      justify-content: center;
      padding: 8px 0;
      animation: float 6s ease-in-out infinite;
    }

    .classic-board {
      display: flex;
      flex-direction: column;
      max-width: 500px;
      width: 100%;
    }

    .classic-drop-row {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 2px;
      margin-bottom: 4px;
      padding: 0 6px;
    }

    .drop-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 1.1rem;
      padding: 4px 0;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .drop-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.12);
      color: var(--text);
      transform: translateY(-2px);
    }
    .drop-btn:disabled { opacity: 0.2; cursor: default; }

    .classic-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 4px;
      background: rgba(12, 25, 52, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(100, 180, 255, 0.08);
      border-top: 1px solid rgba(100, 180, 255, 0.16);
      border-radius: 16px;
      padding: 8px;
      box-shadow:
        0 12px 44px rgba(0, 0, 0, 0.55),
        0 0 30px rgba(59, 130, 246, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.045);
    }

    /* Empty hole — concave sphere illusion */
    .cell {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%,
        rgba(25, 55, 105, 0.38) 0%,
        rgba(4, 10, 22, 0.95) 52%,
        rgba(1, 4, 12, 1) 100%
      );
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow:
        inset 0 4px 12px rgba(0, 0, 0, 0.82),
        inset 2px 2px 5px rgba(0, 0, 0, 0.5),
        0 1px 2px rgba(255, 255, 255, 0.04);
      transition: transform 0.15s;
    }

    /* Pieces — convex sphere with specular highlight */
    .piece-0 {
      background: radial-gradient(circle at 34% 27%, #ffaaaa 0%, #ef4444 36%, #c81e1e 66%, #7f1d1d 100%);
      border: 1px solid rgba(239, 68, 68, 0.30);
      box-shadow:
        0 6px 22px rgba(239, 68, 68, 0.48),
        0 2px 6px rgba(0, 0, 0, 0.45),
        inset 0 -4px 8px rgba(0, 0, 0, 0.36),
        inset 3px 4px 8px rgba(255, 255, 255, 0.24);
    }
    .piece-1 {
      background: radial-gradient(circle at 34% 27%, #fffab0 0%, #facc15 36%, #ca8a04 66%, #78350f 100%);
      border: 1px solid rgba(250, 204, 21, 0.30);
      box-shadow:
        0 6px 22px rgba(250, 204, 21, 0.42),
        0 2px 6px rgba(0, 0, 0, 0.45),
        inset 0 -4px 8px rgba(0, 0, 0, 0.36),
        inset 3px 4px 8px rgba(255, 255, 255, 0.28);
    }
    .piece-2 {
      background: radial-gradient(circle at 34% 27%, #bfdbfe 0%, #3b82f6 36%, #1d4ed8 66%, #1e3a8a 100%);
      border: 1px solid rgba(59, 130, 246, 0.30);
      box-shadow:
        0 6px 22px rgba(59, 130, 246, 0.48),
        0 2px 6px rgba(0, 0, 0, 0.45),
        inset 0 -4px 8px rgba(0, 0, 0, 0.36),
        inset 3px 4px 8px rgba(255, 255, 255, 0.24);
    }
    .piece-3 {
      background: radial-gradient(circle at 34% 27%, #bbf7d0 0%, #22c55e 36%, #15803d 66%, #14532d 100%);
      border: 1px solid rgba(34, 197, 94, 0.30);
      box-shadow:
        0 6px 22px rgba(34, 197, 94, 0.48),
        0 2px 6px rgba(0, 0, 0, 0.45),
        inset 0 -4px 8px rgba(0, 0, 0, 0.36),
        inset 3px 4px 8px rgba(255, 255, 255, 0.24);
    }

    .cell.win-cell {
      animation: pulse-win 0.7s ease-in-out var(--win-delay, 0.35s) infinite alternate;
    }
    .cell.win-cell.drop-anim {
      animation: piece-drop 0.40s cubic-bezier(0.34, 1.56, 0.64, 1),
                 pulse-win 0.7s ease-in-out var(--win-delay, 0.35s) infinite alternate;
    }

    .cell.drop-anim {
      animation: piece-drop 0.40s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes piece-drop {
      0%   { transform: translateY(-280%); opacity: 0.3; filter: brightness(1.4); }
      62%  { transform: translateY(6%); }
      78%  { transform: translateY(-3%); }
      91%  { transform: translateY(2%); }
      100% { transform: translateY(0); opacity: 1; filter: brightness(1); }
    }

    @keyframes pulse-win {
      0%   { transform: scale(1);    filter: brightness(1);   box-shadow: none; }
      50%  { transform: scale(1.28); filter: brightness(1.9); box-shadow: 0 0 30px rgba(255, 255, 255, 1); }
      100% { transform: scale(1.12); filter: brightness(1.45); box-shadow: 0 0 18px rgba(255, 255, 255, 0.65); }
    }

    /* ── 3D Board ── */
    .board3d-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 12px;
    }
    .board3d-controls label { font-size: 0.80rem; color: var(--muted); }

    .board3d-shell {
      width: 100%;
      height: min(70vw, 480px);
      border-radius: 20px;
      overflow: visible;
      border: 1px solid rgba(100, 180, 255, 0.09);
      border-top: 1px solid rgba(100, 180, 255, 0.16);
      background:
        radial-gradient(ellipse at 50% 25%, rgba(25, 50, 110, 0.26) 0%, transparent 65%),
        radial-gradient(ellipse at 30% 80%, rgba(10, 20, 50, 0.4) 0%, transparent 55%),
        rgba(7, 13, 24, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: relative;
      perspective: 900px;
      box-shadow:
        0 14px 50px rgba(0, 0, 0, 0.55),
        0 0 40px rgba(59, 130, 246, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .board3d-hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 0.72rem;
      background: rgba(5, 10, 20, 0.60);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 4px 14px;
      border-radius: 99px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      z-index: 5;
      pointer-events: none;
      letter-spacing: 0.02em;
    }

    .board3d-scene {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      cursor: grab;
      display: grid;
      place-items: center;
      touch-action: none;
    }
    .board3d-scene.dragging { cursor: grabbing; }

    .board3d {
      position: relative;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
    }

    /* 3D empty slot — dark glass marble with specular catch-light */
    .voxel {
      position: absolute;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      transform-style: preserve-3d;
      /* Three layered radial gradients:
         1) Small bright specular spot top-left  → sphere catch-light
         2) Soft secondary bounce light bottom-right → depth
         3) Main dark glass body with blue rim   */
      background:
        radial-gradient(circle at 30% 26%, rgba(255,255,255,0.62) 0%, rgba(210,230,255,0.22) 16%, transparent 32%),
        radial-gradient(circle at 68% 70%, rgba(65,125,255,0.15) 0%, transparent 28%),
        radial-gradient(circle at 50% 50%,
          rgba(2, 5, 20, 1)  0%,
          rgba(7, 16, 46, 1) 34%,
          rgba(18, 46, 114, 0.90) 62%,
          rgba(36, 80, 172, 0.60) 80%,
          rgba(55, 108, 215, 0.32) 100%
        );
      border: 1.5px solid rgba(72, 135, 245, 0.42);
      box-shadow:
        inset 0 6px 20px rgba(0, 0, 0, 0.96),
        inset 0 -1px 6px rgba(55, 110, 230, 0.14),
        0 0 14px rgba(48, 95, 210, 0.22),
        0 2px 6px rgba(0, 0, 0, 0.72);
      transition: filter 0.2s;
    }

    /* 3D pieces — convex spheres with specular highlight */
    .voxel.piece-0 {
      background: radial-gradient(circle at 33% 27%, #ffc0c0 0%, #ef4444 34%, #c81e1e 62%, #7f1d1d 100%);
      border: 1px solid rgba(239, 68, 68, 0.35);
      box-shadow:
        0 8px 28px rgba(239, 68, 68, 0.55),
        0 3px 8px rgba(0, 0, 0, 0.5),
        inset 0 -5px 12px rgba(0, 0, 0, 0.42),
        inset 3px 5px 10px rgba(255, 255, 255, 0.26);
    }
    .voxel.piece-1 {
      background: radial-gradient(circle at 33% 27%, #fffac0 0%, #facc15 34%, #ca8a04 62%, #78350f 100%);
      border: 1px solid rgba(250, 204, 21, 0.32);
      box-shadow:
        0 8px 28px rgba(250, 204, 21, 0.48),
        0 3px 8px rgba(0, 0, 0, 0.5),
        inset 0 -5px 12px rgba(0, 0, 0, 0.42),
        inset 3px 5px 10px rgba(255, 255, 255, 0.30);
    }
    .voxel.piece-2 {
      background: radial-gradient(circle at 33% 27%, #dbeafe 0%, #3b82f6 34%, #1d4ed8 62%, #1e3a8a 100%);
      border: 1px solid rgba(59, 130, 246, 0.35);
      box-shadow:
        0 8px 28px rgba(59, 130, 246, 0.55),
        0 3px 8px rgba(0, 0, 0, 0.5),
        inset 0 -5px 12px rgba(0, 0, 0, 0.42),
        inset 3px 5px 10px rgba(255, 255, 255, 0.26);
    }
    .voxel.piece-3 {
      background: radial-gradient(circle at 33% 27%, #dcfce7 0%, #22c55e 34%, #15803d 62%, #14532d 100%);
      border: 1px solid rgba(34, 197, 94, 0.32);
      box-shadow:
        0 8px 28px rgba(34, 197, 94, 0.55),
        0 3px 8px rgba(0, 0, 0, 0.5),
        inset 0 -5px 12px rgba(0, 0, 0, 0.42),
        inset 3px 5px 10px rgba(255, 255, 255, 0.26);
    }

    .voxel.win-cell {
      animation: pulse-win-3d 0.7s ease-in-out var(--win-delay, 0.35s) infinite alternate;
    }

    @keyframes pulse-win-3d {
      0%   { filter: brightness(1); }
      50%  { filter: brightness(2.4); box-shadow: 0 0 44px 18px rgba(255, 255, 140, 1); }
      100% { filter: brightness(1.65); box-shadow: 0 0 26px 9px rgba(255, 255, 200, 0.85); }
    }

    /* 3D sphere drop-in animation using CSS custom properties for target position */
    @keyframes sphere-drop-3d {
      0% {
        transform: translate3d(var(--tx), calc(var(--ty) - 340px), var(--tz));
        opacity: 0.12;
        filter: brightness(0.5);
      }
      60% {
        transform: translate3d(var(--tx), calc(var(--ty) + 11px), var(--tz));
        filter: brightness(1.65);
        opacity: 1;
      }
      78% {
        transform: translate3d(var(--tx), calc(var(--ty) - 5px), var(--tz));
        filter: brightness(1.2);
      }
      90% {
        transform: translate3d(var(--tx), calc(var(--ty) + 3px), var(--tz));
      }
      100% {
        transform: translate3d(var(--tx), var(--ty), var(--tz));
        opacity: 1;
        filter: brightness(1);
      }
    }

    .voxel.drop-anim-3d {
      animation: sphere-drop-3d 0.52s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }

    /* 3D in-scene orientation labels (rotate with the board) */
    .face-label-3d {
      position: absolute;
      width: 100px;
      text-align: center;
      padding: 5px 0;
      font-size: 0.52rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-radius: 50px;
      pointer-events: none;
      user-select: none;
      backdrop-filter: blur(14px) saturate(160%);
      -webkit-backdrop-filter: blur(14px) saturate(160%);
    }
    .face-label-3d.is-front-3d {
      background: linear-gradient(135deg, rgba(90, 30, 200, 0.55) 0%, rgba(20, 60, 200, 0.45) 45%, rgba(0, 170, 210, 0.35) 100%);
      border: 1px solid rgba(180, 140, 255, 0.65);
      color: rgba(225, 205, 255, 0.97);
      box-shadow:
        0 0 28px rgba(120, 60, 255, 0.45),
        0 0 10px rgba(60, 200, 255, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        inset 0 -1px 0 rgba(180, 100, 255, 0.15);
      text-shadow: 0 0 14px rgba(190, 150, 255, 0.85);
    }
    .face-label-3d.is-back-3d {
      background: linear-gradient(135deg, rgba(8, 5, 28, 0.45) 0%, rgba(14, 22, 65, 0.35) 100%);
      border: 1px solid rgba(70, 55, 130, 0.28);
      color: rgba(110, 90, 170, 0.48);
    }

    .drop-node {
      position: absolute;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: rgba(255, 255, 255, 0.45);
      display: grid;
      place-items: center;
      font-size: 0.65rem;
      cursor: pointer;
      z-index: 4;
      user-select: none;
      touch-action: manipulation;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      scale: 1;
      box-shadow: 0 3px 10px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.10);
    }
    .drop-node:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.46);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.15), 0 6px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
      scale: 1.18;
      color: rgba(255, 255, 255, 0.80);
    }
    .drop-node:disabled { opacity: 0.12; cursor: default; }
    .drop-node.suggest-0 {
      background: rgba(239, 68, 68, 0.28);
      border-color: rgba(239, 68, 68, 0.55);
      box-shadow: 0 0 14px rgba(239, 68, 68, 0.28), 0 3px 10px rgba(0,0,0,0.35);
      color: rgba(255, 190, 190, 0.80);
    }
    .drop-node.suggest-1 {
      background: rgba(250, 204, 21, 0.26);
      border-color: rgba(250, 204, 21, 0.55);
      box-shadow: 0 0 14px rgba(250, 204, 21, 0.25), 0 3px 10px rgba(0,0,0,0.35);
      color: rgba(255, 240, 150, 0.80);
    }
    .drop-node.suggest-2 {
      background: rgba(59, 130, 246, 0.28);
      border-color: rgba(59, 130, 246, 0.55);
      box-shadow: 0 0 14px rgba(59, 130, 246, 0.28), 0 3px 10px rgba(0,0,0,0.35);
      color: rgba(150, 200, 255, 0.80);
    }
    .drop-node.suggest-3 {
      background: rgba(34, 197, 94, 0.26);
      border-color: rgba(34, 197, 94, 0.55);
      box-shadow: 0 0 14px rgba(34, 197, 94, 0.28), 0 3px 10px rgba(0,0,0,0.35);
      color: rgba(150, 255, 190, 0.80);
    }

    /* ── 3D 2D Drop Panel ── */
    .drop3d-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 14px;
      background: rgba(8, 16, 36, 0.65);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      margin-bottom: 10px;
    }
    .drop3d-panel-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .drop3d-grid {
      display: grid;
      grid-template-columns: repeat(4, 32px);
      gap: 4px;
      /* Perspective tilt: back rows shrink away, front row stays close */
      transform: perspective(200px) rotateX(28deg);
      transform-origin: center bottom;
    }
    .drop3d-face-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 16px;
      border-radius: 99px;
      text-align: center;
      backdrop-filter: blur(10px) saturate(150%);
      -webkit-backdrop-filter: blur(10px) saturate(150%);
    }
    .drop3d-face-label.is-back {
      background: linear-gradient(135deg, rgba(8, 5, 25, 0.48) 0%, rgba(12, 20, 55, 0.38) 100%);
      border: 1px solid rgba(60, 45, 120, 0.25);
      color: rgba(100, 80, 160, 0.45);
    }
    .drop3d-face-label.is-front {
      background: linear-gradient(135deg, rgba(70, 25, 170, 0.52) 0%, rgba(15, 55, 175, 0.42) 50%, rgba(0, 155, 190, 0.30) 100%);
      border: 1px solid rgba(170, 130, 255, 0.62);
      color: rgba(215, 190, 255, 0.95);
      box-shadow: 0 0 22px rgba(110, 55, 255, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.20);
      text-shadow: 0 0 10px rgba(170, 130, 255, 0.75);
    }
    .drop3d-btn {
      width: 32px;
      height: 28px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      color: rgba(255, 255, 255, 0.40);
      cursor: pointer;
      font-size: 0.68rem;
      padding: 0;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .drop3d-btn:disabled { opacity: 0.18; cursor: default; }
    .drop3d-btn:not(:disabled):hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.32);
      color: rgba(255, 255, 255, 0.85);
    }
    .drop3d-btn.suggest-0 { background: rgba(239,68,68,0.24); border-color: rgba(239,68,68,0.52); color: rgba(255,185,185,0.88); }
    .drop3d-btn.suggest-1 { background: rgba(250,204,21,0.22); border-color: rgba(250,204,21,0.52); color: rgba(255,242,155,0.88); }
    .drop3d-btn.suggest-2 { background: rgba(59,130,246,0.24); border-color: rgba(59,130,246,0.52); color: rgba(155,205,255,0.88); }
    .drop3d-btn.suggest-3 { background: rgba(34,197,94,0.22); border-color: rgba(34,197,94,0.52); color: rgba(155,255,195,0.88); }

    /* ── Win Overlay ── */
    #winOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
      background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.62) 0%, transparent 70%);
    }
    #winOverlay.show { opacity: 1; backdrop-filter: blur(2px); }

    .win-text {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 900;
      padding: 22px 44px;
      background: rgba(5, 10, 25, 0.52);
      backdrop-filter: blur(24px) saturate(130%) brightness(1.02);
      -webkit-backdrop-filter: blur(24px) saturate(130%) brightness(1.02);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-top: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 26px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
      text-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
      animation: win-pop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                 win-glow 0.9s 0.65s ease-in-out infinite alternate;
    }

    @keyframes win-pop {
      from { transform: scale(0.15) rotate(-10deg); opacity: 0; }
      60%  { transform: scale(1.22) rotate(4deg);  opacity: 1; }
      80%  { transform: scale(0.92) rotate(-2deg); }
      to   { transform: scale(1)    rotate(0deg);  opacity: 1; }
    }

    @keyframes win-glow {
      from { text-shadow: 0 4px 30px rgba(0, 0, 0, 0.8); filter: brightness(1); }
      to   { text-shadow: 0 0 50px currentColor, 0 0 110px currentColor, 0 4px 30px rgba(0, 0, 0, 0.8); filter: brightness(1.35); }
    }

    /* ── Confetti Canvas ── */
    #confettiCanvas {
      position: fixed;
      inset: 0;
      z-index: 99;
      pointer-events: none;
    }

    /* ── Screen shake ── */
    @keyframes shake {
      0%, 100% { transform: translate(0); }
      15% { transform: translate(-5px, 3px); }
      30% { transform: translate(5px, -4px); }
      45% { transform: translate(-4px, 5px); }
      60% { transform: translate(4px, -3px); }
      75% { transform: translate(-3px, 4px); }
    }
    .shake { animation: shake 0.55s ease; }

    @keyframes board-flash {
      0%   { box-shadow: none; }
      18%  { box-shadow: 0 0 90px 28px rgba(255, 255, 255, 0.45); }
      100% { box-shadow: none; }
    }
    .board-flash { animation: board-flash 0.85s ease-out; }

    /* ── Board entrance (game start) ── */
    @keyframes board-enter {
      0%   { transform: translateY(-200px) scale(0.86); opacity: 0; }
      48%  { opacity: 1; }
      65%  { transform: translateY(16px) scale(1.03); }
      80%  { transform: translateY(-8px) scale(0.99); }
      92%  { transform: translateY(5px) scale(1.01); }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    /* Classic board: suppress float during entrance (cells handle the animation) */
    .board-container.board-entering {
      animation: none;
    }
    .board3d-shell.board-entering {
      animation: board-enter 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* Classic board intro: grid background fades in */
    @keyframes grid-fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .classic-grid.grid-entering {
      animation: grid-fadein 0.85s ease-out both;
    }

    /* Classic board intro: each column of cells falls in with a bounce */
    @keyframes col-enter {
      0%   { opacity: 0; transform: translateY(-56px) scale(0.82); }
      55%  { opacity: 1; transform: translateY(5px) scale(1.05); }
      73%  { transform: translateY(-3px) scale(0.98); }
      88%  { transform: translateY(2px) scale(1.01); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .cell.col-enter {
      animation: col-enter 0.46s cubic-bezier(0.22, 1, 0.36, 1) both;
      animation-delay: var(--col-delay, 0s);
    }

    /* ── Ambient ── */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes shimmer-border {
      0%, 100% { border-top-color: rgba(100, 180, 255, 0.10); }
      50% { border-top-color: rgba(100, 180, 255, 0.22); }
    }

    #boardCard {
      animation: shimmer-border 5s ease-in-out infinite;
    }

    /* ── Animated Background Blobs ── */
    #bgBlobs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform;
    }

    /* Dark mode blob gradients — kept moderate so they glow through glass without blowing out */
    .blob1 { background: radial-gradient(circle, rgba(59,130,246,0.46) 0%, transparent 70%); }
    .blob2 { background: radial-gradient(circle, rgba(139,92,246,0.40) 0%, transparent 70%); }
    .blob3 { background: radial-gradient(circle, rgba(6,182,212,0.38) 0%, transparent 70%); }
    .blob4 { background: radial-gradient(circle, rgba(99,102,241,0.36) 0%, transparent 70%); }
    .blob5 { background: radial-gradient(circle, rgba(236,72,153,0.30) 0%, transparent 70%); }

    /* Light mode blob gradients */
    body.light .blob1 { background: radial-gradient(circle, rgba(147,197,253,0.65) 0%, transparent 70%); }
    body.light .blob2 { background: radial-gradient(circle, rgba(196,181,253,0.58) 0%, transparent 70%); }
    body.light .blob3 { background: radial-gradient(circle, rgba(110,231,183,0.55) 0%, transparent 70%); }
    body.light .blob4 { background: radial-gradient(circle, rgba(186,230,253,0.62) 0%, transparent 70%); }
    body.light .blob5 { background: radial-gradient(circle, rgba(252,165,165,0.50) 0%, transparent 70%); }

    .blob1 {
      width: 700px; height: 700px;
      top: -200px; left: -180px;
      filter: blur(90px);
      animation: blob1Move 26s ease-in-out infinite alternate, blobPulse 6s ease-in-out 0s infinite alternate;
    }
    .blob2 {
      width: 580px; height: 580px;
      top: 15%; right: -160px;
      filter: blur(82px);
      animation: blob2Move 32s ease-in-out infinite alternate, blobPulse 8s ease-in-out 2s infinite alternate;
    }
    .blob3 {
      width: 500px; height: 500px;
      bottom: -80px; left: 25%;
      filter: blur(86px);
      animation: blob3Move 22s ease-in-out infinite alternate, blobPulse 5s ease-in-out 1s infinite alternate;
    }
    .blob4 {
      width: 420px; height: 420px;
      top: 38%; left: 18%;
      filter: blur(76px);
      animation: blob4Move 36s ease-in-out infinite alternate, blobPulse 7s ease-in-out 3s infinite alternate;
    }
    .blob5 {
      width: 520px; height: 620px;
      bottom: 8%; right: 15%;
      filter: blur(96px);
      animation: blob5Move 19s ease-in-out infinite alternate, blobPulse 9s ease-in-out 4s infinite alternate;
    }

    @keyframes blobPulse {
      0%   { opacity: 0.40; }
      100% { opacity: 0.72; }
    }
    @keyframes blob1Move {
      0%   { transform: translate(0,0) scale(1);           border-radius: 50%; }
      30%  { transform: translate(180px,130px) scale(1.12); border-radius: 42% 58% 52% 48%; }
      60%  { transform: translate(60px,260px) scale(0.93);  border-radius: 55% 45% 47% 53%; }
      100% { transform: translate(220px,-60px) scale(1.08); border-radius: 48% 52% 50% 50%; }
    }
    @keyframes blob2Move {
      0%   { transform: translate(0,0) scale(1);              border-radius: 50%; }
      25%  { transform: translate(-140px,100px) scale(1.10);  border-radius: 56% 44% 48% 52%; }
      55%  { transform: translate(-240px,-80px) scale(0.93);  border-radius: 44% 56% 55% 45%; }
      100% { transform: translate(-180px,200px) scale(1.06);  border-radius: 50% 50% 44% 56%; }
    }
    @keyframes blob3Move {
      0%   { transform: translate(0,0) scale(1);               border-radius: 50%; }
      35%  { transform: translate(-160px,-120px) scale(1.14);  border-radius: 46% 54% 58% 42%; }
      65%  { transform: translate(200px,-80px) scale(0.90);    border-radius: 52% 48% 44% 56%; }
      100% { transform: translate(-80px,-200px) scale(1.05);   border-radius: 50%; }
    }
    @keyframes blob4Move {
      0%   { transform: translate(0,0) scale(1);              border-radius: 50%; }
      40%  { transform: translate(240px,120px) scale(1.15);   border-radius: 55% 45% 50% 50%; }
      70%  { transform: translate(-120px,180px) scale(0.88);  border-radius: 42% 58% 46% 54%; }
      100% { transform: translate(160px,-140px) scale(1.09);  border-radius: 50% 50% 56% 44%; }
    }
    @keyframes blob5Move {
      0%   { transform: translate(0,0) scale(1);              border-radius: 50% 50% 40% 60%; }
      30%  { transform: translate(-200px,-100px) scale(1.12); border-radius: 44% 56% 52% 48%; }
      60%  { transform: translate(80px,-180px) scale(0.95);   border-radius: 58% 42% 48% 52%; }
      100% { transform: translate(-140px,120px) scale(1.07);  border-radius: 50%; }
    }

    /* ── Theme Toggle Button ── */
    #themeToggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 200;
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.10) 0%, transparent 50%),
        var(--glass-bg);
      backdrop-filter: blur(20px) saturate(130%) brightness(1.02);
      -webkit-backdrop-filter: blur(20px) saturate(130%) brightness(1.02);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-shine);
      color: var(--text);
      font-size: 1.18rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    #themeToggle:hover {
      transform: scale(1.12) rotate(20deg);
      box-shadow: 0 6px 24px rgba(0,0,0,0.32), 0 0 22px rgba(251,191,36,0.20);
    }

    /* ── Light Mode Overrides ── */
    body.light .lobby-header h1 {
      background: linear-gradient(160deg, #1e3a70 0%, #2d55a8 40%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(59,130,246,0.18));
    }
    body.light .card {
      background:
        linear-gradient(138deg, rgba(255,255,255,0.42) 0%, rgba(255,255,255,0.10) 24%, transparent 42%),
        radial-gradient(ellipse 92% 50% at 96% 100%, rgba(255,255,255,0.18) 0%, transparent 55%),
        var(--glass-bg);
    }
    body.light .card:hover {
      border-color: rgba(255,255,255,0.70);
      border-top-color: rgba(255,255,255,0.95);
    }
    body.light .player-badge {
      background: rgba(255,255,255,0.42);
      border-top-color: rgba(255,255,255,0.82);
    }
    body.light .room-item {
      background: rgba(255,255,255,0.22);
      border-color: rgba(0,0,0,0.06);
      border-top-color: rgba(255,255,255,0.70);
    }
    body.light .room-item:hover { background: rgba(255,255,255,0.38); }
    body.light .chip {
      background: rgba(0,0,0,0.07);
      border-color: rgba(0,0,0,0.09);
    }
    body.light .btn-secondary {
      background: rgba(0,0,0,0.07);
      color: var(--text);

        0 8px 28px rgba(202, 138, 4, 0.55),
        0 2px 8px rgba(0, 0, 0, 0.22),
        inset 0 -6px 14px rgba(0, 0, 0, 0.32),
        inset 4px 6px 12px rgba(255, 255, 255, 0.55);

    body.light .piece-2, body.light .voxel.piece-2 {

      box-shadow:
        0 8px 28px rgba(29, 78, 216, 0.55),

      color: rgba(70, 50, 150, 0.52);
    }

    /* ── Customize Panel ── */
    .customize-layout {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      flex-wrap: wrap;
    }
    .customize-inputs {
      flex: 1;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .color-swatch-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .color-swatch-label {
      font-size: 0.80rem;
      color: var(--muted);
      letter-spacing: 0.02em;
      pointer-events: none;
    }
    .swatch-ring {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      padding: 3px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 4px 14px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.10);
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), border-color 0.22s, box-shadow 0.22s;
    }
    .color-swatch-wrap:hover .swatch-ring {
      transform: scale(1.10);
      border-color: rgba(255,255,255,0.26);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.14);
    }
    .color-swatch-display {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--swatch-bg, #ef4444);
      box-shadow: 0 0 14px var(--swatch-bg, #ef4444), 0 2px 6px rgba(0,0,0,0.35);
      transition: box-shadow 0.22s;
      pointer-events: none;
    }
    input.hidden-picker {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      padding: 0;
      border: none;
      border-radius: 0;
      background: none;
      box-shadow: none;
    }
    input.hidden-picker:focus { box-shadow: none; border: none; }
    .customize-preview {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 11px 16px;
      border-radius: 14px;
      background: rgba(10, 20, 42, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.09);
      border-top: 2px solid rgba(255,255,255,0.18);
      font-size: 0.92rem;
      font-weight: 600;
      min-width: 130px;
      transition: border-top-color 0.3s, box-shadow 0.3s;
    }
    body.light .customize-preview {
      background: rgba(255,255,255,0.42);
      border-top-color: rgba(255,255,255,0.82);
    }

    /* ── Badge pop animation (triggered when color/name confirmed) ── */
    @keyframes badge-pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.24); }
      65%  { transform: scale(0.93); }
      100% { transform: scale(1); }
    }
    .badge-pop { animation: badge-pop 0.44s cubic-bezier(0.34,1.56,0.64,1) both; }

    /* ── Color swatch burst (on Apply) ── */
    @keyframes swatch-burst {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.40); box-shadow: 0 0 36px var(--swatch-bg,#ef4444), 0 0 0 10px rgba(255,255,255,0.12), 0 3px 8px rgba(0,0,0,0.4); }
      70%  { transform: scale(0.88); }
      100% { transform: scale(1); }
    }
    .swatch-burst { animation: swatch-burst 0.52s cubic-bezier(0.34,1.56,0.64,1) both; }

    /* ── Apply button confirm flash ── */
    @keyframes confirm-flash {
      0%   { box-shadow: 0 2px 10px rgba(251,191,36,0.22), inset 0 1px 0 rgba(255,255,255,0.22); }
      40%  { box-shadow: 0 0 0 8px rgba(251,191,36,0.18), 0 6px 22px rgba(251,191,36,0.50), inset 0 1px 0 rgba(255,255,255,0.22); }
      100% { box-shadow: 0 2px 10px rgba(251,191,36,0.22), inset 0 1px 0 rgba(255,255,255,0.22); }
    }
    .confirm-flash { animation: confirm-flash 0.55s ease-out; }

    /* ── Toggle Buttons ── */
    .toggle-group { display: flex; gap: 4px; }
    .toggle-option {
      flex: 1;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      padding: 9px 12px;
      font: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      box-shadow: none;
      transition: background 0.18s, color 0.18s, transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s;
    }
    .toggle-option.active {
      background: rgba(255,255,255,0.14);
      color: var(--text);
      border-color: rgba(255,255,255,0.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 2px 8px rgba(0,0,0,0.22);
    }
    .toggle-option:hover:not(.active):not(:disabled) {
      background: rgba(255,255,255,0.11);
      color: var(--text);
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }
    body.light .toggle-option {
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.10);
      color: var(--muted);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
    }
    body.light .toggle-option.active {
      background: rgba(0,0,0,0.10);
      color: var(--text);
      border-color: rgba(0,0,0,0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.70), 0 2px 6px rgba(0,0,0,0.10);
    }
    body.light .toggle-option:hover:not(.active):not(:disabled) {
      background: rgba(0,0,0,0.10);
      color: var(--text);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .lobby-row { grid-template-columns: 1fr; }
      .players-bar { gap: 4px; }
      .player-badge { padding: 5px 10px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div id="bgBlobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
    <div class="blob blob5"></div>
  </div>
  <button id="themeToggle" title="Toggle light/dark mode">🌙</button>
  <canvas id="confettiCanvas"></canvas>
  <div id="winOverlay"><div class="win-text" id="winText"></div></div>

  <main class="app">
    <!-- LOBBY -->
    <section id="lobbyView">
      <div class="lobby-header">
        <h1>Connect 4</h1>
        <p>4-Player Arena &middot; Classic &amp; 3D</p>
      </div>

      <div class="lobby-row">
        <!-- Your Profile — spans both columns -->
        <div class="card" style="grid-column: 1 / -1">
          <h3>Your Profile</h3>
          <div class="customize-layout">
            <div class="color-swatch-wrap" title="Click to pick your colour">
              <span class="color-swatch-label">Colour</span>
              <div class="swatch-ring">

              </div>

            </div>
            <div class="customize-inputs">
              <div class="form-group" style="margin-bottom:0">
                <label>Display Name</label>
                <input id="lobbyNameInput" maxlength="20" placeholder="Your name" />
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <h3>Create Room</h3>
          <div class="form-group">
            <label>Room Name</label>
            <input id="createName" maxlength="30" placeholder="My Room" />
          </div>
          <div class="form-group">
            <label>Mode</label>
            <div class="toggle-group">

          <div id="joinCodeError" class="error-msg"></div>

      </div>

        <div id="publicRooms" class="room-list"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    /* ── DOM refs ── */
    const lobbyView = document.getElementById("lobbyView");
    const roomView = document.getElementById("roomView");
    const createName = document.getElementById("createName");
    const createRoomBtn = document.getElementById("createRoomBtn");
    const mode2dBtn = document.getElementById("mode2dBtn");
    const mode3dBtn = document.getElementById("mode3dBtn");
    const visPublicBtn = document.getElementById("visPublicBtn");
    const visPrivateBtn = document.getElementById("visPrivateBtn");

    const lobbyColorInput = document.getElementById("lobbyColorInput");
    const lobbySwatchDisplay = document.getElementById("lobbySwatchDisplay");
    const createError = document.getElementById("createError");
    const joinCode = document.getElementById("joinCode");
    const joinCodeBtn = document.getElementById("joinCodeBtn");
    const joinCodeError = document.getElementById("joinCodeError");
    const publicRoomsEl = document.getElementById("publicRooms");
    const roomTitle = document.getElementById("roomTitle");
    const modeChip = document.getElementById("modeChip");
    const visibilityChip = document.getElementById("visibilityChip");
    const codeChip = document.getElementById("codeChip");
    const hostChip = document.getElementById("hostChip");
    const statusLine = document.getElementById("statusLine");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const rematchBtn = document.getElementById("rematchBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const playersBar = document.getElementById("playersBar");
    const classicArea = document.getElementById("classicArea");
    const mode3dArea = document.getElementById("mode3dArea");
    const boardCard = document.getElementById("boardCard");
    const confettiCanvas = document.getElementById("confettiCanvas");
    const winOverlay = document.getElementById("winOverlay");
    const winText = document.getElementById("winText");

    /* ── Constants ── */
    const CLASSIC_ROWS = 7;
    const CLASSIC_COLS = 9;
    const D3_SIZE = 4;

    /* ── State ── */
    let publicRooms = [];
    let roomState = null;
    let mySlotIndex = null;
    let prevBoard = null;
    let prevBoard3D = null;
    let prevPhase = null;
    let lobbyMode = "classic";
    let lobbyVisibility = "public";
    let lobbyProfileTouched = false;

    const camera = { rotX: -27, rotY: 34, panX: 0, panY: 0, layerSpacing: 78, drag: null };

    /* ── Helpers ── */
    function showLobby() { lobbyView.classList.remove("hidden"); roomView.classList.add("hidden"); }
    function showRoom() { lobbyView.classList.add("hidden"); roomView.classList.remove("hidden"); }
    function clearErrors() { createError.textContent = ""; joinCodeError.textContent = ""; }

    function activeSlots(s) {
      return s.slots.map((sl, i) => ({ sl, i })).filter(x => x.sl.occupied).map(x => x.i);
    }
    function isHost() { return roomState && mySlotIndex === roomState.hostSlot; }
    function canPlayTurn() { return roomState && roomState.phase === "playing" && mySlotIndex === roomState.currentSlot; }
    function playerName(i) { return roomState?.slots[i]?.name || "P" + (i + 1); }
    function playerColor(i) { return roomState?.slots[i]?.color || "#fff"; }

    function escapeHtml(t) {
      return String(t).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function winSet2D(s) {
      if (!s.winResult || !Array.isArray(s.winResult.cells)) return new Set();
      return new Set(s.winResult.cells.map(([r, c]) => r + "," + c));
    }

    function winSet3D(s) {
      if (!s.winResult || !Array.isArray(s.winResult.cells)) return new Set();
      return new Set(s.winResult.cells.map(([y, x, z]) => y + "," + x + "," + z));
    }

    function colorNameFromHex(hex) {
      const named = [
        // ── Reds ──

        { name: "Orange",         r: 249, g: 115, b: 22  },
        { name: "Persimmon",      r: 236, g: 88,  b: 0   },
        { name: "Tangerine",      r: 242, g: 133, b: 0   },
        { name: "Mango",          r: 255, g: 130, b: 67  },
        { name: "Apricot",        r: 251, g: 176, b: 117 },
        // ── Yellows ──
        { name: "Amber",          r: 255, g: 191, b: 0   },

        { name: "Sunflower",      r: 255, g: 205, b: 0   },

      const c = lobbyColorInput.value;

      lobbySwatchDisplay.style.background = c;
      lobbySwatchDisplay.style.boxShadow = "0 0 14px " + c + ", 0 3px 8px rgba(0,0,0,0.4)";

    function sendLobbyProfile() {
      if (!lobbyProfileTouched) return;
      socket.emit("setPlayerCustomization", {
        name: lobbyNameInput.value.trim() || colorNameFromHex(lobbyColorInput.value),
        color: lobbyColorInput.value,

    /* ── Render Public Rooms ── */
    function renderPublicRooms() {
      publicRoomsEl.innerHTML = "";
      if (publicRooms.length === 0) {
        publicRoomsEl.innerHTML = '<div class="empty-msg">No public rooms yet.</div>';
        return;
      }
      for (const room of publicRooms) {
        const item = document.createElement("div");
        item.className = "room-item";
        item.innerHTML =
          '<div><div class="room-item-info">' + escapeHtml(room.name) + '</div>' +
          '<div class="room-item-meta">' + (room.gameMode === "3d" ? "3D" : "Classic") +
          " \u00B7 " + room.playerCount + "/" + room.maxPlayers + " \u00B7 " + room.phase + '</div></div>';
        const btn = document.createElement("button");
        btn.className = "btn-sm btn-secondary";
        btn.textContent = "Join";
        btn.disabled = room.phase !== "lobby" || !!roomState;
        btn.onclick = () => {
          clearErrors();
          socket.emit("joinRoom", { roomId: room.id }, (r) => {
            r = r || {};
            if (r.error) { joinCodeError.textContent = r.error; return; }
            mySlotIndex = r.slotIndex;
            sendLobbyProfile();
          });
        };
        item.appendChild(btn);
        publicRoomsEl.appendChild(item);
      }
    }

    /* ── Render Room ── */
    function renderRoom() {
      if (!roomState) { showLobby(); return; }
      showRoom();

      roomTitle.textContent = roomState.name;
      modeChip.textContent = roomState.gameMode === "3d" ? "3D" : "Classic";
      visibilityChip.textContent = roomState.isPublic ? "Public" : "Private";
      if (roomState.code) { codeChip.textContent = "Code: " + roomState.code; codeChip.classList.remove("hidden"); }
      else { codeChip.classList.add("hidden"); }
      hostChip.classList.toggle("hidden", !isHost());

      statusLine.textContent = buildStatus();

      const host = isHost();
      const active = activeSlots(roomState);
      startBtn.classList.toggle("hidden", !(roomState.phase === "lobby" && active.length >= 2 && host));
      restartBtn.classList.toggle("hidden", !(host && (roomState.phase === "playing" || roomState.phase === "ended")));
      rematchBtn.classList.toggle("hidden", !(host && roomState.phase === "ended"));

      renderPlayersBar();

      const isNewGame = prevPhase !== "playing" && roomState.phase === "playing";

      if (roomState.gameMode === "classic") {
        mode3dArea.classList.add("hidden");
        classicArea.classList.remove("hidden");
        renderClassicBoard(isNewGame);
      } else {
        classicArea.classList.add("hidden");
        mode3dArea.classList.remove("hidden");
        render3DBoard(isNewGame);
      }

      if (roomState.phase === "ended" && roomState.winResult && prevPhase !== "ended") {
        celebrate(roomState.winResult.slotIndex);
      }
      prevPhase = roomState.phase;
    }

    function buildStatus() {
      if (!roomState) return "";
      if (roomState.phase === "lobby") {
        const n = activeSlots(roomState).length;
        if (isHost()) return n < 2 ? "Waiting for players\u2026" : "Ready! Press Start.";
        return "Waiting for host\u2026";
      }
      if (roomState.phase === "playing") {
        const c = roomState.currentSlot;
        return c === mySlotIndex ? "\uD83C\uDFAF Your turn!" : playerName(c) + "'s turn";
      }
      if (roomState.phase === "ended") {
        if (roomState.winResult) return "\uD83C\uDFC6 " + playerName(roomState.winResult.slotIndex) + " wins!";
        return "Draw! No one wins.";
      }
      return "";
    }

    function renderPlayersBar() {
      playersBar.innerHTML = "";
      roomState.slots.forEach((slot, i) => {
        const badge = document.createElement("div");
        badge.className = "player-badge";
        if (i === mySlotIndex) badge.classList.add("me");
        if (roomState.phase === "playing" && i === roomState.currentSlot) badge.classList.add("active-turn");
        badge.innerHTML =
          '<span class="player-dot" style="background:' + slot.color + '"></span>' +
          '<span>' + escapeHtml(slot.name) + (i === mySlotIndex ? " (You)" : "") + '</span>' +
          '<span class="player-wins">' + (slot.occupied ? "W:" + (roomState.wins[i] || 0) : "Empty") + '</span>';
        playersBar.appendChild(badge);
      });
    }

    /* ── Classic Board ── */
    function renderClassicBoard(isNewGame) {
      if (!roomState.board) {
        classicArea.innerHTML = '<p class="empty-msg">Waiting for host to start\u2026</p>';
        prevBoard = null;
        return;
      }

      const canDrop = canPlayTurn();
      const wins = winSet2D(roomState);
      const winsArr = [...wins];

      let newCell = null;
      if (prevBoard && roomState.gameMode === "classic") {
        for (let r = 0; r < CLASSIC_ROWS; r++) {
          for (let c = 0; c < CLASSIC_COLS; c++) {
            if (prevBoard[r] && prevBoard[r][c] === null && roomState.board[r][c] !== null) {
              newCell = r + "," + c;
            }
          }
        }
      }
      prevBoard = roomState.board.map(row => row.slice());

      const wrap = document.createElement("div");
      wrap.className = "board-container";

      const board = document.createElement("div");
      board.className = "classic-board";

      const dropRow = document.createElement("div");
      dropRow.className = "classic-drop-row";
      for (let c = 0; c < CLASSIC_COLS; c++) {
        const btn = document.createElement("button");
        btn.className = "drop-btn";
        btn.textContent = "\u25BC";
        btn.disabled = !canDrop;
        const col = c;
        btn.onclick = () => socket.emit("dropDisc", { col });
        dropRow.appendChild(btn);
      }

      const grid = document.createElement("div");
      grid.className = "classic-grid";
      if (isNewGame) grid.classList.add("grid-entering");
      const colStagger = 0.062; // seconds between each column appearing
      for (let r = 0; r < CLASSIC_ROWS; r++) {
        for (let c = 0; c < CLASSIC_COLS; c++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          const v = roomState.board[r][c];
          if (typeof v === "number") cell.classList.add("piece-" + v);
          if (wins.has(r + "," + c)) {
            cell.classList.add("win-cell");
            const idx = winsArr.indexOf(r + "," + c);
            cell.style.setProperty("--win-delay", (0.35 + idx * 0.1) + "s");
          }
          if (newCell === r + "," + c) cell.classList.add("drop-anim");
          if (isNewGame) {
            cell.classList.add("col-enter");
            cell.style.setProperty("--col-delay", (c * colStagger) + "s");
          }
          grid.appendChild(cell);
        }
      }

      board.appendChild(dropRow);
      board.appendChild(grid);
      wrap.appendChild(board);
      classicArea.innerHTML = "";
      classicArea.appendChild(wrap);
    }

    /* ── 3D Board ── */
    function render3DBoard(isNewGame) {
      if (!roomState.board) {
        mode3dArea.innerHTML = '<p class="empty-msg">Waiting for host to start\u2026</p>';
        prevBoard3D = null;
        return;
      }

      const canDrop = canPlayTurn();
      const wins = winSet3D(roomState);

      // Detect the newly placed piece for drop animation
      let newCell3D = null;
      if (prevBoard3D) {
        outer3D: for (let y = 0; y < D3_SIZE; y++) {
          for (let x = 0; x < D3_SIZE; x++) {
            for (let z = 0; z < D3_SIZE; z++) {
              if (prevBoard3D[y]?.[x]?.[z] === null && roomState.board[y][x][z] !== null) {
                newCell3D = y + "," + x + "," + z;
                break outer3D;
              }
            }
          }
        }
      }
      prevBoard3D = roomState.board.map(layer => layer.map(row => row.slice()));

      mode3dArea.innerHTML =
        '<div class="board3d-controls">' +
        '<label>Spacing</label>' +
        '<input id="layerSpacing" type="range" min="42" max="130" value="' + camera.layerSpacing + '" style="width:160px">' +
        '<button id="resetCam" class="btn-sm btn-secondary" type="button">Reset View</button>' +
        '</div>' +
        '<div id="drop3dPanel" class="drop3d-panel"></div>' +
        '<div class="board3d-shell" id="board3dShell">' +
        '<div class="board3d-hint">Drag to rotate \u00B7 Shift+drag to pan</div>' +
        '<div class="board3d-scene" id="board3dScene">' +
        '<div class="board3d" id="board3d"></div>' +
        '</div></div>';

      const scene = document.getElementById("board3dScene");
      const board = document.getElementById("board3d");
      const spacingInput = document.getElementById("layerSpacing");
      const resetBtn = document.getElementById("resetCam");
      const shell = document.getElementById("board3dShell");
      if (isNewGame && shell) {
        shell.classList.add("board-entering");
        shell.addEventListener("animationend", () => shell.classList.remove("board-entering"), { once: true });
      }

      applyCamera(scene);
      wireScenePan(scene);

      spacingInput.oninput = () => {
        camera.layerSpacing = Number(spacingInput.value);
        draw3D(board, wins, canDrop, null);
      };
      resetBtn.onclick = () => {
        camera.rotX = -27; camera.rotY = 34;
        camera.panX = 0; camera.panY = 0;
        applyCamera(scene);
      };

      draw3D(board, wins, canDrop, newCell3D);
    }

    function draw3D(boardEl, wins, canDrop, newCell3D) {
      boardEl.innerHTML = "";
      const winsArr = [...wins];
      const step = 68;
      const center = (D3_SIZE - 1) / 2;
      const lStep = camera.layerSpacing;

      for (let y = 0; y < D3_SIZE; y++) {
        for (let x = 0; x < D3_SIZE; x++) {
          for (let z = 0; z < D3_SIZE; z++) {
            const tx = (x - center) * step;
            const tz = (z - center) * step;
            const ty = (y - center) * lStep;

            const voxel = document.createElement("div");
            voxel.className = "voxel";
            // Store position as CSS vars so the drop keyframe animation can reference them
            voxel.style.setProperty("--tx", tx + "px");
            voxel.style.setProperty("--ty", (-ty) + "px");
            voxel.style.setProperty("--tz", tz + "px");
            voxel.style.transform = "translate3d(var(--tx), var(--ty), var(--tz))";

            const v = roomState.board[y][x][z];
            if (typeof v === "number") voxel.classList.add("piece-" + v);
            if (wins.has(y + "," + x + "," + z)) {
              voxel.classList.add("win-cell");
              const idx = winsArr.indexOf(y + "," + x + "," + z);
              voxel.style.setProperty("--win-delay", (0.35 + idx * 0.1) + "s");
            }
            if (newCell3D === y + "," + x + "," + z) voxel.classList.add("drop-anim-3d");

            boardEl.appendChild(voxel);
          }
        }
      }

      // Update the flat 2D drop panel (outside 3D space to avoid perspective bugs)
      const panel = document.getElementById("drop3dPanel");
      if (panel) fill3DPanel(panel, canDrop);

      // Add FRONT / BACK labels into the 3D scene so they rotate with the board
      const labelBottomY = center * lStep + 42;
      const faceZ = center * step + 52;
      const sceneLabels = [
        { text: "FRONT", cls: "is-front-3d", tz: -faceZ, rotY: 0 },
        { text: "BACK",  cls: "is-back-3d",  tz:  faceZ, rotY: 180 },
      ];
      for (const fl of sceneLabels) {
        const lbl = document.createElement("div");
        lbl.className = "face-label-3d " + fl.cls;
        lbl.textContent = fl.text;
        lbl.style.transform = "translate3d(-50px," + labelBottomY + "px," + fl.tz + "px) rotateY(" + fl.rotY + "deg)";
        boardEl.appendChild(lbl);
      }
    }

    function fill3DPanel(panel, canDrop) {
      panel.innerHTML = "";

      const header = document.createElement("div");
      header.className = "drop3d-panel-label";
      header.textContent = canDrop ? "Drop" : "Waiting\u2026";
      panel.appendChild(header);

      const backLabel = document.createElement("div");
      backLabel.className = "drop3d-face-label is-back";
      backLabel.textContent = "\u25B2 Back";
      panel.appendChild(backLabel);

      const grid = document.createElement("div");
      grid.className = "drop3d-grid";

      // z=D3_SIZE-1 is back (top of panel), z=0 is front (bottom of panel)
      for (let z = D3_SIZE - 1; z >= 0; z--) {
        for (let x = 0; x < D3_SIZE; x++) {
          const open = roomState.board[D3_SIZE - 1][x][z] === null;
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "drop3d-btn";
          if (canDrop && open) btn.classList.add("suggest-" + mySlotIndex);
          btn.disabled = !canDrop || !open;
          btn.title = "Column x" + (x + 1) + " z" + (z + 1);
          btn.textContent = open ? "\u25BC" : "\u25CF";
          const cx = x, cz = z;
          btn.onclick = () => socket.emit("dropDisc3D", { x: cx, z: cz });
          grid.appendChild(btn);
        }
      }
      panel.appendChild(grid);

      const frontLabel = document.createElement("div");
      frontLabel.className = "drop3d-face-label is-front";
      frontLabel.textContent = "\u25BC Front \u2014 nearest to you";
      panel.appendChild(frontLabel);
    }

    /* ── 3D Camera ── */
    function wireScenePan(scene) {
      scene.oncontextmenu = (e) => e.preventDefault();

      scene.onpointerdown = (e) => {
        camera.drag = { x: e.clientX, y: e.clientY, shift: e.shiftKey, id: e.pointerId };
        scene.setPointerCapture(e.pointerId);
        scene.classList.add("dragging");
      };

      scene.onpointermove = (e) => {
        if (!camera.drag || e.pointerId !== camera.drag.id) return;
        const dx = e.clientX - camera.drag.x;
        const dy = e.clientY - camera.drag.y;

        if (camera.drag.shift) {
          camera.panX += dx;
          camera.panY += dy;
        } else {
          camera.rotY += dx * 0.4;
          camera.rotX = Math.max(-85, Math.min(85, camera.rotX + dy * 0.35));
        }

        camera.drag.x = e.clientX;
        camera.drag.y = e.clientY;
        applyCamera(scene);
      };

      scene.onpointerup = (e) => {
        if (camera.drag && camera.drag.id === e.pointerId) {
          scene.releasePointerCapture(e.pointerId);
          camera.drag = null;
          scene.classList.remove("dragging");
        }
      };

      scene.onpointercancel = () => {
        camera.drag = null;
        scene.classList.remove("dragging");
      };
    }

    function applyCamera(scene) {
      scene.style.transform =
        "translate(" + camera.panX + "px," + camera.panY + "px) " +
        "rotateX(" + camera.rotX + "deg) rotateY(" + camera.rotY + "deg)";
    }

    /* ── Confetti ── */
    const ctx = confettiCanvas.getContext("2d");
    let particles = [];
    let confettiAnim = null;

    function resizeCanvas() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function celebrate(slotIndex) {
      const color = playerColor(slotIndex);

      // Win overlay
      winText.textContent = playerName(slotIndex) + " wins!";
      winText.style.color = color;
      winOverlay.classList.add("show");
      setTimeout(() => winOverlay.classList.remove("show"), 3800);

      // Screen shake + board flash
      boardCard.classList.add("shake");
      setTimeout(() => boardCard.classList.remove("shake"), 550);
      boardCard.classList.add("board-flash");
      setTimeout(() => boardCard.classList.remove("board-flash"), 850);

      // Confetti — two waves
      spawnConfetti(color);
      setTimeout(() => spawnConfetti(color), 600);
    }

    function spawnConfetti(mainColor) {
      const colors = [mainColor, "#fff", "#fbbf24", "#ec4899", "#8b5cf6", "#06b6d4", "#10b981", "#f97316"];
      particles = [];
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;

      for (let i = 0; i < 280; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 5 + Math.random() * 18;
        const burst = i < 100;
        particles.push({
          x: cx + (burst ? 0 : (Math.random() - 0.5) * 100),
          y: cy + (burst ? 0 : (Math.random() - 0.5) * 50) - (burst ? 0 : 90),
          vx: Math.cos(angle) * speed * (0.6 + Math.random() * 0.9),
          vy: Math.sin(angle) * speed * (0.6 + Math.random() * 0.9) - (burst ? 7 : 2),
          size: 5 + Math.random() * 10,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 18,
          life: 1,
          decay: 0.004 + Math.random() * 0.007,
          shape: ["rect", "circle", "star"][Math.floor(Math.random() * 3)],
        });
      }

      if (confettiAnim) cancelAnimationFrame(confettiAnim);
      animateConfetti();
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      let alive = false;

      for (const p of particles) {
        if (p.life <= 0) continue;
        alive = true;

        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.vx *= 0.99;
        p.rotation += p.rotSpeed;
        p.life -= p.decay;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation * Math.PI / 180);
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        if (p.shape === "rect") {
          ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
        } else if (p.shape === "star") {
          const outer = p.size / 2, inner = p.size / 4;
          let rot = -Math.PI / 2;
          const step = Math.PI / 5;
          ctx.beginPath();
          for (let pt = 0; pt < 5; pt++) {
            ctx.lineTo(Math.cos(rot) * outer, Math.sin(rot) * outer); rot += step;
            ctx.lineTo(Math.cos(rot) * inner, Math.sin(rot) * inner); rot += step;
          }
          ctx.closePath();
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      if (alive) {
        confettiAnim = requestAnimationFrame(animateConfetti);
      } else {
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        confettiAnim = null;
      }
    }

    /* ── Lobby Profile & Toggle Wiring ── */
    lobbyColorInput.oninput = () => { lobbyProfileTouched = true; updateLobbyProfile(); };
    lobbyNameInput.oninput = () => { lobbyProfileTouched = true; };
    updateLobbyProfile();

    mode2dBtn.onclick = () => { lobbyMode = "classic"; mode2dBtn.classList.add("active"); mode3dBtn.classList.remove("active"); };
    mode3dBtn.onclick = () => { lobbyMode = "3d"; mode3dBtn.classList.add("active"); mode2dBtn.classList.remove("active"); };
    visPublicBtn.onclick = () => { lobbyVisibility = "public"; visPublicBtn.classList.add("active"); visPrivateBtn.classList.remove("active"); };
    visPrivateBtn.onclick = () => { lobbyVisibility = "private"; visPrivateBtn.classList.add("active"); visPublicBtn.classList.remove("active"); };

    /* ── Event Handlers ── */
    createRoomBtn.onclick = () => {
      if (roomState) return;
      clearErrors();
      socket.emit("createRoom", {
        name: createName.value.trim(),
        isPublic: lobbyVisibility === "public",
        gameMode: lobbyMode === "3d" ? "3d" : "classic",
      }, (r) => {
        r = r || {};
        if (r.error) { createError.textContent = r.error; return; }
        mySlotIndex = r.slotIndex;
        sendLobbyProfile();
      });
    };

    joinCodeBtn.onclick = () => {
      if (roomState) return;
      clearErrors();
      const code = joinCode.value.trim().toUpperCase();
      if (!code) { joinCodeError.textContent = "Enter a code."; return; }
      socket.emit("joinByCode", { code }, (r) => {
        r = r || {};
        if (r.error) { joinCodeError.textContent = r.error; return; }
        mySlotIndex = r.slotIndex;
        sendLobbyProfile();
      });
    };

    startBtn.onclick = () => socket.emit("startGame");
    restartBtn.onclick = () => socket.emit("restart");
    rematchBtn.onclick = () => socket.emit("rematch");

    leaveBtn.onclick = () => {
      socket.emit("leaveRoom");
      roomState = null;
      mySlotIndex = null;
      prevBoard = null;
      prevBoard3D = null;
      prevPhase = null;
      showLobby();
      renderPublicRooms();
    };

    /* ── Socket Events ── */
    socket.on("roomState", (s) => { roomState = s; renderRoom(); });
    socket.on("publicRooms", (r) => { publicRooms = Array.isArray(r) ? r : []; renderPublicRooms(); });

    socket.on("connect", () => {
      socket.emit("listRooms", {}, (r) => {
        publicRooms = Array.isArray(r) ? r : [];
        renderPublicRooms();
      });
    });

    socket.on("disconnect", () => {
      if (roomState) statusLine.textContent = "Reconnecting\u2026";
    });

    /* ── Theme Toggle ── */
    const themeToggle = document.getElementById("themeToggle");
    (function () {
      const saved = localStorage.getItem("theme");
      if (saved === "light") {
        document.body.classList.add("light");
        themeToggle.textContent = "\u2600\uFE0F";
      } else {
        localStorage.setItem("theme", "dark");
      }
    })();
    themeToggle.onclick = () => {
      const isLight = document.body.classList.toggle("light");
      themeToggle.textContent = isLight ? "\u2600\uFE0F" : "\uD83C\uDF19";
      localStorage.setItem("theme", isLight ? "light" : "dark");
    };

    /* ── Init ── */
    showLobby();
    renderPublicRooms();
  </script>
</body>
</html>
